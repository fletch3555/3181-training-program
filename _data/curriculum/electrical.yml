name: Electrical
title: Electrical Systems Training
description: Electrical systems and control implementation curriculum for FRC teams
intro: This module provides comprehensive training in electrical systems and control implementation for FRC team members. Students will progress from basic electrical concepts to advanced control systems and troubleshooting.
moduleType: Technical
order: 4
resources:
  - FRC Control System Documentation
  - Electrical Safety Guidelines
  - Wiring Best Practices
  - Component Specifications
levels:
  - level: 1
    title: Basic Electronics
    description: Fundamental electrical concepts and safety
    objective: Master fundamental electrical concepts including voltage, current, and resistance relationships through Ohm's law, understand electrical safety procedures and proper use of measurement tools, develop basic circuit construction skills using breadboards and hand tools, and learn proper wire management techniques.
    prerequisites: []
    primaryResources:
      - Electrical Safety Manual
      - Basic Electronics Guide
      - Circuit Construction Guide
      - Wire Management Standards
    tasks:
      - heading: Electrical Safety
        items:
          - text: Complete electrical safety training
            subitems: []
          - text: Identify potential electrical hazards
            subitems: []
          - text: Use proper personal protective equipment
            subitems: []
          - text: Demonstrate emergency response procedures
            subitems: []
      - heading: Basic Circuit Theory
        items:
          - text: Understand Ohm's Law
            subitems: []
          - text: Calculate power in DC circuits
            subitems: []
          - text: Analyze series and parallel circuits
            subitems: []
          - text: Use multimeter for basic measurements
            subitems: []
      - heading: Circuit Construction
        items:
          - text: Build basic circuits on breadboards
            subitems: []
          - text: Solder basic electrical connections
            subitems: []
          - text: Crimp various electrical connectors
            subitems: []
          - text: Complete basic wiring project
            subitems: []
      - heading: Wire Management
        items:
          - text: Select appropriate wire sizes
            subitems: []
          - text: Create proper wire routing paths
            subitems: []
          - text: Apply cable management techniques
            subitems: []
          - text: Label wires and connections properly
            subitems: []
    completionRequirements:
      - Complete all checklist items with mentor verification
      - Pass electrical safety certification
      - Successfully build and test basic circuits
      - Demonstrate proper wire management
  - level: 2
    title: Robot Electronics
    description: Robot electrical systems and motor control
    objective: Design and implement FRC-specific electrical systems including power distribution, motor controller setup, and sensor integration, understand motor characteristics and control methods for different applications, implement proper grounding and noise reduction techniques, and develop basic troubleshooting skills.
    prerequisites:
      - module: electrical
        level: 1
        text: null
      - module: programming
        level: 1
        text: null
    primaryResources:
      - FRC Electrical Guide
      - Motor Control Manual
      - Sensor Integration Guide
      - Troubleshooting Manual
    tasks:
      - heading: Power Systems
        items:
          - text: Set up power distribution panel
            subitems: []
          - text: Configure breaker panel
            subitems: []
          - text: Implement voltage regulation
            subitems: []
          - text: Design power routing
            subitems: []
      - heading: Motor Control
        items:
          - text: Configure motor controllers
            subitems: []
          - text: Understand motor characteristics
            subitems: []
          - text: Implement current limiting
            subitems: []
          - text: Test motor operation
            subitems: []
      - heading: Sensor Integration
        items:
          - text: Install limit switches
            subitems: []
          - text: Configure encoders
            subitems: []
          - text: Set up gyro/accelerometer
            subitems: []
          - text: Test sensor operation
            subitems: []
      - heading: System Maintenance
        items:
          - text: Perform basic troubleshooting
            subitems: []
          - text: Monitor system health
            subitems: []
          - text: Maintain electrical documentation
            subitems: []
          - text: Create spare parts inventory
            subitems: []
    completionRequirements:
      - Complete all checklist items with mentor verification
      - Successfully build robot electrical system
      - Pass motor control evaluation
      - Demonstrate troubleshooting skills
