    title: Advanced Competition Management
    description: High-level competition strategy and team coordination
    objective: Lead competition-level strategic operations including multi-match planning and alliance coordination, develop advanced data analytics systems for real-time decision support, create comprehensive playbooks for various game scenarios and opponents, and coordinate cross-functional teams during competition.
