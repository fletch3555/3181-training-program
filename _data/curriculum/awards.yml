name: Awards
title: Awards & Recognition Training
description: Documentation, award submission preparation, and presentation skills for FRC teams
intro: This module provides comprehensive training in FIRST award documentation, submission strategy, and presentation skills for FRC team members. Students will progress from basic award understanding to leading championship-level award programs.
moduleType: Non-Technical
order: 10
resources:
  - FIRST Award Descriptions and Rubrics
  - Award Submission Templates
  - Interview Preparation Guide
  - Documentation Best Practices
