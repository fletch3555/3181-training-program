name: CAD
title: CAD Training
description: Computer-Aided Design (CAD) training curriculum for FRC teams
intro: This module provides comprehensive training in Computer-Aided Design for FRC team members, using OnShape and FRCDesign.org resources. Students will progress from basic CAD fundamentals to complete robot system design and integration.
moduleType: Technical
order: 1
resources:
  - CAD Software Installation Guide
  - FRC CAD Templates
  - Design Requirements Reference
  - Technical Documentation Standards
levels:
  - level: 1
    title: Fundamentals
    description: Basic CAD skills and concepts for FRC teams
    objective: Master the CAD software interface and navigation, create fully-constrained 2D sketches using geometric and dimensional constraints, generate basic 3D parts through extrusion and modification features, and establish proper file management practices for collaborative design work.
    prerequisites: []
    primaryResources:
      - 'OnShape Learning Center: Fundamentals Course'
      - FRC Design Basics tutorials
      - OnShape mobile app for design review practice
    tasks:
      - heading: Interface Navigation & Setup
        items:
          - text: Complete OnShape account setup and team workspace creation
            subitems: []
          - text: Complete OnShape Learning Center "Fundamentals Course" (Parts 1-3)
            subitems: []
          - text: Navigate all major OnShape toolbars and feature tree without assistance
            subitems: []
          - text: Customize workspace and shortcuts for efficient FRC workflow
            subitems: []
          - text: Demonstrate 15+ keyboard shortcuts for common OnShape commands
            subitems: []
          - text: <strong>Assessment:</strong> Navigate OnShape interface and demonstrate shortcuts to mentor in <5 minutes
            subitems: []
      - heading: 2D Sketching Mastery
        items:
          - text: Complete OnShape "Sketching" learning path modules
            subitems: []
          - text: Follow FRCDesign.org "Sketching Best Practices" tutorial
            subitems: []
          - text: Create fully constrained sketches using lines, circles, arcs, and splines
            subitems: []
          - text: Apply geometric constraints (parallel, perpendicular, tangent, concentric)
            subitems: []
          - text: Use dimensional constraints and parametric relationships
            subitems: []
          - text: <strong>Validation Project:</strong> Create 5 progressively complex fully-defined sketches from FRCDesign.org practice library
            subitems: []
          - text: <strong>Assessment:</strong> Sketch a complex bracket profile (provided drawing) in <15 minutes with full constraints
            subitems: []
      - heading: Basic 3D Features
        items:
          - text: Complete OnShape "Part Design" learning modules (Extrude, Revolve, Sweep)
            subitems: []
          - text: Follow FRCDesign.org "Basic Part Modeling" tutorial series
            subitems: []
          - text: Create extrusions and revolves from 2D sketches
            subitems: []
          - text: Perform cuts, holes, and boolean operations
            subitems: []
          - text: Apply fillets, chamfers, and draft features
            subitems: []
          - text: Use patterns (linear, circular) for repeated features
            subitems: []
          - text: <strong>Capstone Project:</strong> Design and model a simple FRC intake roller using OnShape
            subitems:
              - 'Must include: extrusions, cuts, fillets, and circular pattern'
              - Follow FRCDesign.org mechanical design principles
          - text: <strong>Assessment:</strong> Mentor review of roller design for manufacturability and FRC compliance
            subitems: []
      - heading: File Management & Collaboration
        items:
          - text: Complete OnShape "Collaboration" learning modules
            subitems: []
          - text: Set up FRC team document organization system in OnShape
            subitems: []
          - text: Use proper naming conventions for FRC parts (follow FRCDesign.org standards)
            subitems: []
          - text: Practice version control and branching in OnShape
            subitems: []
          - text: Share documents with appropriate permissions
            subitems: []
          - text: Export files in multiple formats (STEP, STL, PDF, drawings)
            subitems: []
          - text: <strong>Team Integration:</strong> Set up shared FRC parts library with standard hardware
            subitems: []
          - text: <strong>Assessment:</strong> Demonstrate proper file organization and sharing to mentor
            subitems: []
    completionRequirements:
      - Pass OnShape fundamentals assessment (available in OnShape Learning Center)
      - Complete all FRCDesign.org basic tutorials
      - Submit portfolio of 5 progressively complex parts
      - Mentor sign-off on interface proficiency and file management
  - level: 2
    title: Part Design & Assembly
    description: Advanced part design and assembly techniques for FRC teams
    objective: Create complex 3D parts using advanced modeling features (revolve, sweep, loft, patterns), build multi-part assemblies with proper mate constraints and interference checking, apply design for manufacturing principles including tolerances and standard fasteners, and generate technical drawings with dimensions and annotations.
    prerequisites:
      - module: cad
        level: 1
        text: null
    primaryResources:
      - OnShape "Assemblies" and "Drawings" learning paths
      - FRCDesign.org "Assembly Design" and "Drivetrain Design" courses
      - OnShape "Advanced Part Modeling" modules
    tasks:
      - heading: Advanced Part Features
        items:
          - text: Complete OnShape "Advanced Part Modeling" learning path
            subitems: []
          - text: Follow FRCDesign.org "Advanced Part Design" tutorials
            subitems: []
          - text: Master revolve, sweep, and loft operations
            subitems: []
          - text: Create complex patterns (feature-driven, table-driven)
            subitems: []
          - text: Use multi-body part design techniques
            subitems: []
          - text: Apply configurations for part families
            subitems: []
          - text: <strong>Project Series:</strong> Complete FRCDesign.org "Wheel Design Challenge"
            subitems:
              - Design custom omni wheel with multiple configurations
              - 'Use advanced features: revolve, circular patterns, configurations'
          - text: <strong>Assessment:</strong> Design a custom FRC bumper bracket with 3 size configurations
            subitems: []
      - heading: Assembly Creation & Management
        items:
          - text: Complete OnShape "Assemblies" learning path (all modules)
            subitems: []
          - text: Follow FRCDesign.org "FRC Assembly Best Practices" course
            subitems: []
          - text: Insert parts and sub-assemblies into main assembly
            subitems: []
          - text: Apply mate constraints (fastened, revolute, cylindrical, planar, ball)
            subitems: []
          - text: Create assembly configurations for different robot states
            subitems: []
          - text: Check for interferences using OnShape collision detection
            subitems: []
          - text: <strong>Major Project:</strong> Build complete FRC drivetrain assembly following FRCDesign.org tutorial
            subitems:
              - 'Include: chassis, wheels, motors, gearboxes, chain/belt drives'
              - Demonstrate proper mate relationships and configurations
          - text: <strong>Assessment:</strong> Assembly functions properly with no interferences, all DOF controlled
            subitems: []
      - heading: Design for Manufacturing (DFM)
        items:
          - text: Complete FRCDesign.org "Manufacturing Considerations" course
            subitems: []
          - text: Study OnShape "Sheet Metal" and "Weldments" features for FRC applications
            subitems: []
          - text: Apply appropriate tolerances using OnShape's tolerance analysis tools
            subitems: []
          - text: Design parts considering FRC manufacturing constraints (waterjet, 3D printing, machining)
            subitems: []
          - text: Integrate standard FRC fasteners from OnShape Parts Library
            subitems: []
          - text: Use FRCDesign.org material selection guidelines
            subitems: []
          - text: <strong>Integration Project:</strong> Redesign Level 1 roller for actual manufacturing
            subitems:
              - 'Include: proper tolerances, fastener selection, material specifications'
              - Consider waterjet cutting and 3D printed components
          - text: <strong>Assessment:</strong> Manufacturing review with mentor/machinist approval
            subitems: []
      - heading: Technical Documentation
        items:
          - text: Complete OnShape "Drawings" learning path
            subitems: []
          - text: Follow FRCDesign.org "Technical Drawing Standards" tutorial
            subitems: []
          - text: Create dimensioned drawings with proper GD&T
            subitems: []
          - text: Add section views, detail views, and exploded views
            subitems: []
          - text: Generate automated Bill of Materials (BOM) from assembly
            subitems: []
          - text: Include material specifications and finish callouts
            subitems: []
          - text: Create assembly instructions using OnShape's drawing tools
            subitems: []
          - text: <strong>Documentation Project:</strong> Complete drawing package for drivetrain assembly
            subitems:
              - Assembly drawing, individual part drawings, BOM, assembly instructions
          - text: <strong>Assessment:</strong> Drawing package review for completeness and clarity
            subitems: []
    completionRequirements:
      - Complete all OnShape Learning Center assembly and drawing assessments
      - Finish FRCDesign.org "Assembly Design" course with certificate
      - Submit complete drivetrain assembly with documentation package
      - Mentor approval of DFM principles application
      - Peer teaching demonstration to Level 1 student
  - level: 3
    title: Robot Subsystem Design
    description: Advanced robot subsystem design and analysis
    objective: Design complete functional robot subsystems incorporating mechanical calculations (gear ratios, forces, motion analysis), create dynamic assemblies with motion studies and interference detection, integrate electrical component placement and wire routing considerations into mechanical designs, and validate designs against FRC rules and performance requirements through simulation and analysis.
    prerequisites:
      - module: mechanical
        level: 2
        text: null
      - module: cad
        level: 2
        text: null
    primaryResources:
      - FRCDesign.org "Complete Robot Design" course series
      - OnShape "Simulation" and "Motion Studies" features
      - FRCDesign.org "Mechanism Design" and "Systems Integration" courses
      - OnShape "Advanced Assemblies" learning path
    tasks:
      - heading: Mechanism Design & Analysis
        items:
          - text: Complete FRCDesign.org "Mechanism Design Theory" course
            subitems: []
          - text: Study OnShape motion analysis tools and kinematic studies
            subitems: []
          - text: Design complex multi-degree-of-freedom mechanisms (arms, elevators, intakes)
            subitems: []
          - text: Calculate gear ratios, mechanical advantage, and power requirements
            subitems: []
          - text: Use FRCDesign.org calculation tools and spreadsheets
            subitems: []
          - text: Analyze motion profiles and velocity/acceleration curves
            subitems: []
          - text: <strong>Major Project:</strong> Design complete robot arm subsystem
            subitems:
              - Multi-stage telescoping or articulated design
              - Include all mechanical calculations and motion analysis
              - Follow FRCDesign.org mechanical design principles
          - text: <strong>Assessment:</strong> Present design rationale and calculations to technical review panel
            subitems: []
      - heading: Advanced Assembly & Motion Studies
        items:
          - text: Master OnShape advanced assembly features (linear patterns, circular patterns in assemblies)
            subitems: []
          - text: Complete FRCDesign.org "Advanced Assembly Techniques" tutorials
            subitems: []
          - text: Use advanced mates (gear, rack-and-pinion, cam-follower)
            subitems: []
          - text: Create realistic motion studies showing mechanism operation
            subitems: []
          - text: Perform interference detection during full range of motion
            subitems: []
          - text: Optimize assemblies for serviceability and access
            subitems: []
          - text: <strong>Integration Project:</strong> Create full motion study of robot arm
            subitems:
              - Show complete range of motion with realistic timing
              - Demonstrate no interferences throughout operation
              - Include motor mounting and drive system
          - text: <strong>Assessment:</strong> Motion study presentation showing design validation
            subitems: []
      - heading: Electrical Integration Planning
        items:
          - text: Study FRCDesign.org "Electrical-Mechanical Integration" course
            subitems: []
          - text: Learn OnShape routing tools for cable management
            subitems: []
          - text: Design with electrical component placement considerations
            subitems: []
          - text: Plan wire routing paths and protection
            subitems: []
          - text: Consider electromagnetic interference (EMI) in design
            subitems: []
          - text: Coordinate with Programming Level 2 for sensor placement optimization
            subitems: []
          - text: <strong>Collaborative Project:</strong> Work with Electrical Level 2 student to integrate systems
            subitems:
              - Design mechanical mounts for all electrical components
              - Plan wire routing with appropriate service access
              - Consider weight distribution and center of gravity
          - text: <strong>Assessment:</strong> Joint presentation with electrical team member
            subitems: []
      - heading: Design Validation & FRC Compliance
        items:
          - text: Master OnShape simulation tools (FEA basics, stress analysis)
            subitems: []
          - text: Complete FRCDesign.org "FRC Rules and Design Constraints" course
            subitems: []
          - text: Validate designs against current FRC game rules
            subitems: []
          - text: Perform basic finite element analysis on critical components
            subitems: []
          - text: Create multiple design iterations based on analysis
            subitems: []
          - text: Document design decisions and trade-offs
            subitems: []
          - text: <strong>Validation Project:</strong> Complete design review process for robot arm
            subitems:
              - FRC rules compliance check
              - Stress analysis on critical components
              - Weight analysis and optimization
              - Design review presentation to full team
          - text: <strong>Assessment:</strong> Successfully defend design choices in formal design review
            subitems: []
    completionRequirements:
      - Complete FRCDesign.org "Complete Robot Design" course with certificate
      - Master OnShape simulation and motion study tools
      - Submit complete subsystem design with full documentation
      - Pass formal design review with technical panel
      - Successfully integrate design with electrical systems
      - Mentor approval for advancement to system-level design
  - level: 4
    title: Full Robot Integration
    description: Leadership in robot design and integration
    objective: Lead comprehensive robot design architecture from concept through manufacturing, coordinate multi-disciplinary design teams across mechanical, electrical, and programming domains, perform advanced engineering analysis including FEA stress analysis and center of gravity calculations, manage design iterations based on testing feedback, and create complete manufacturing documentation while mentoring junior designers and maintaining design knowledge transfer systems.
    prerequisites:
      - module: cad
        level: 3
        text: null
      - module: project-management
        level: 2
        text: null
      - module: null
        level: null
        text: One additional technical Level 2+
    primaryResources:
      - FRCDesign.org "Robot Architecture" and "Systems Engineering" courses
      - OnShape "Advanced Simulation" and "Professional Workflows" modules
      - FRCDesign.org "Team Leadership" and "Design Management" resources
      - OnShape "Enterprise Features" for large project management
    tasks:
      - heading: System Architecture & Design Leadership
        items:
          - text: Complete FRCDesign.org "Robot Architecture and Systems Engineering" course
            subitems: []
          - text: Master OnShape enterprise project management features
            subitems: []
          - text: Develop overall robot architecture and design philosophy
            subitems: []
          - text: Coordinate multiple subsystem designs and interactions
            subitems: []
          - text: Manage design timeline, milestones, and dependencies
            subitems: []
          - text: Lead weekly design reviews with entire technical team
            subitems: []
          - text: Create and maintain system-level requirements and specifications
            subitems: []
          - text: <strong>Leadership Project:</strong> Lead full robot design from game analysis to final CAD
            subitems:
              - Coordinate 3+ subsystem design teams
              - Manage design schedule and resource allocation
              - Ensure design integration and compatibility
          - text: <strong>Assessment:</strong> 360-degree feedback from team members and mentors
            subitems: []
      - heading: Advanced Engineering Analysis
        items:
          - text: Master OnShape advanced simulation capabilities (nonlinear FEA, dynamic analysis)
            subitems: []
          - text: Complete FRCDesign.org "Advanced Analysis Techniques" course
            subitems: []
          - text: Perform comprehensive stress analysis on critical structural components
            subitems: []
          - text: Analyze center of gravity, moment of inertia, and stability
            subitems: []
          - text: Optimize designs for weight, strength, and performance trade-offs
            subitems: []
          - text: Validate electrical clearances and EMI considerations using OnShape
            subitems: []
          - text: Create detailed engineering analysis reports
            subitems: []
          - text: <strong>Analysis Project:</strong> Complete comprehensive robot analysis package
            subitems:
              - Structural analysis of chassis and critical components
              - Center of gravity analysis in multiple configurations
              - Weight optimization study with performance impact
          - text: <strong>Assessment:</strong> Engineering analysis review by professional engineer mentor
            subitems: []
      - heading: Manufacturing Coordination & Documentation
        items:
          - text: Master OnShape manufacturing-specific features (drawings, BOMs, work instructions)
            subitems: []
          - text: Complete FRCDesign.org "Manufacturing Management" course
            subitems: []
          - text: Generate complete manufacturing documentation package
            subitems: []
          - text: Coordinate closely with Machining Level 3+ students
            subitems: []
          - text: Plan manufacturing sequence, dependencies, and timeline
            subitems: []
          - text: Create detailed assembly instructions and quality check procedures
            subitems: []
          - text: Manage vendor relationships for outsourced manufacturing
            subitems: []
          - text: <strong>Manufacturing Project:</strong> Lead complete robot manufacturing process
            subitems:
              - Generate all required manufacturing documentation
              - Coordinate with machine shop and external vendors
              - Manage manufacturing timeline and quality control
          - text: <strong>Assessment:</strong> Successful robot manufacturing with minimal issues
            subitems: []
      - heading: Continuous Improvement & Knowledge Transfer
        items:
          - text: Establish design iteration process based on testing feedback
            subitems: []
          - text: Create comprehensive design documentation and knowledge base using OnShape
            subitems: []
          - text: Implement lessons learned from competition performance
            subitems: []
          - text: Mentor multiple Level 1-3 CAD students
            subitems: []
          - text: Document design rationale and decision-making process
            subitems: []
          - text: Create design templates and standards for future seasons
            subitems: []
          - text: Contribute to FRCDesign.org community resources
            subitems: []
          - text: <strong>Legacy Project:</strong> Create comprehensive CAD knowledge transfer system
            subitems:
              - Standardized OnShape workspace templates
              - Design review process documentation
              - Mentoring curriculum for future design leaders
          - text: <strong>Assessment:</strong> Successful knowledge transfer demonstrated by student progression
            subitems: []
    completionRequirements:
      - Lead successful complete robot design and manufacturing
      - Complete all FRCDesign.org advanced courses with certificates
      - Master all OnShape professional-level features
      - Successfully mentor at least 2 junior designers to Level 2+
      - Create lasting knowledge transfer systems
      - Receive recommendation for FRC technical mentoring roles
