      - Meeting Facilitation Manual
      - Conflict Resolution Toolkit
      - Performance Management Guide
    tasks:
      - heading: Team Development
        items:
          - text: Lead team building activities
            subitems: []
          - text: Coach individual team members
            subitems: []
          - text: Set team goals and expectations
            subitems: []
          - text: Foster positive team culture
            subitems: []
      - heading: Meeting Leadership
