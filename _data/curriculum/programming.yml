name: Programming
title: Programming Training
description: Software development and programming curriculum for FRC teams
intro: This module provides comprehensive training in programming and software development for FRC team members. Students will progress from basic programming concepts to advanced robot control systems and autonomous operation.
moduleType: Technical
order: 5
resources:
  - WPILib Documentation
  - FRC Programming Guide
  - Version Control Setup
  - Code Style Guide
levels:
  - level: 1
    title: Programming Fundamentals
    description: Basic programming concepts and FRC development environment
    objective: Master fundamental programming concepts including variables, control structures, and functions, set up the FRC development environment with necessary tools and dependencies, implement basic robot control code for tank drive operation, and establish version control practices using Git.
    prerequisites: []
    primaryResources:
      - WPILib Documentation
      - Programming Language Guide
      - Git Basics Tutorial
      - FRC Programming Examples
    tasks:
      - heading: Development Environment
        items:
          - text: Install required software (VS Code, WPILib)
            subitems: []
          - text: Configure Java/C++ development tools
            subitems: []
          - text: Set up Git and GitHub access
            subitems: []
          - text: Create and build sample robot project
            subitems: []
      - heading: Programming Basics
        items:
          - text: Understand variables and data types
            subitems: []
          - text: Implement control structures (if/else, loops)
            subitems: []
          - text: Create functions and methods
            subitems: []
          - text: Learn object-oriented programming basics
            subitems: []
      - heading: Basic Robot Control
        items:
          - text: Implement tank drive control
            subitems: []
          - text: Read joystick inputs
            subitems: []
          - text: Create basic autonomous routines
            subitems: []
          - text: Handle robot state transitions
            subitems: []
      - heading: Version Control
        items:
          - text: Initialize Git repository
            subitems: []
          - text: Make commits with meaningful messages
            subitems: []
          - text: Create and switch branches
            subitems: []
          - text: Push code to GitHub
            subitems: []
    completionRequirements:
      - Complete all checklist items with mentor verification
      - Successfully deploy code to robot
      - Pass programming concepts quiz
      - Demonstrate proper Git usage
  - level: 2
    title: Robot Control Systems
    description: Advanced robot control and sensor integration
    objective: Implement advanced robot control systems including closed-loop feedback and motion profiles, integrate various sensor types with proper calibration and error handling, develop command-based robot architecture with subsystem management, and create comprehensive autonomous routines.
    prerequisites:
      - module: programming
        level: 1
        text: null
      - module: electrical
        level: 1
        text: null
    primaryResources:
      - Advanced Control Guide
      - Sensor Integration Manual
      - Command-Based Programming Tutorial
      - Autonomous Development Guide
    tasks:
      - heading: Advanced Robot Control
        items:
          - text: Implement PID control loops
            subitems: []
          - text: Create motion profiles
            subitems: []
          - text: Design state machines
            subitems: []
          - text: Handle multiple control modes
            subitems: []
      - heading: Sensor Integration
        items:
          - text: Read and process encoder data
            subitems: []
          - text: Integrate gyro/accelerometer input
            subitems: []
          - text: Implement limit switch logic
            subitems: []
          - text: Develop sensor calibration routines
            subitems: []
      - heading: Command-Based Programming
        items:
          - text: Create robot subsystems
            subitems: []
          - text: Implement command patterns
            subitems: []
          - text: Manage subsystem dependencies
            subitems: []
          - text: Handle command scheduling
            subitems: []
      - heading: Autonomous Development
        items:
          - text: Design autonomous strategies
            subitems: []
          - text: Create modular autonomous routines
            subitems: []
          - text: Implement path following
            subitems: []
          - text: Test and validate autonomous modes
            subitems: []
    completionRequirements:
      - Complete all checklist items with mentor verification
      - Successfully implement PID control system
      - Create working autonomous routine
      - Pass code review with senior programmer
  - level: 3
    title: Advanced Systems Integration
    description: Complex robot systems and software architecture
    objective: Design and implement complex robot software architectures with advanced state management and error handling, develop vision processing systems for target tracking and navigation, create sophisticated autonomous behaviors using path planning algorithms, and lead cross-functional integration with mechanical and electrical systems.
    prerequisites:
      - module: programming
        level: 2
        text: null
      - module: electrical
        level: 2
        text: null
    primaryResources:
      - Software Architecture Guide
      - Vision Processing Manual
      - Path Planning Documentation
      - Integration Testing Framework
    tasks:
      - heading: Software Architecture
        items:
          - text: Design robust software architecture
            subitems: []
