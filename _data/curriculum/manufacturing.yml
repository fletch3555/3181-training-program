name: Manufacturing
title: Manufacturing Training
description: Machining and manufacturing curriculum for FRC teams
intro: This module provides comprehensive training in manufacturing and machining operations for FRC team members. Students will progress from basic shop safety to advanced manufacturing leadership and process optimization.
moduleType: Technical
order: 3
resources:
  - Shop Safety Manual
  - Machine Tool Reference Guides
  - Quality Control Standards
  - Manufacturing Best Practices
levels:
  - level: 1
    title: Shop Safety & Basic Tools
    description: Basic shop safety and hand tool operations
    objective: Achieve comprehensive machine shop safety certification including hazard identification and emergency procedures, master precision measurement techniques using calipers, micrometers, and layout tools to specified tolerances, develop proficiency with basic hand tools for filing, cutting, and finishing operations, and demonstrate proper workholding and material handling techniques.
    prerequisites: []
    primaryResources:
      - Shop Safety Manual
      - Precision Measurement Guide
      - Hand Tool Reference
      - Material Handling Guidelines
    tasks:
      - heading: Safety Certification
        items:
          - text: Pass comprehensive shop safety exam (90%+)
            subitems: []
          - text: Demonstrate proper PPE usage
            subitems: []
          - text: Identify all emergency stops and procedures
            subitems: []
          - text: Show proper lifting and material handling techniques
            subitems: []
      - heading: Measuring & Layout
        items:
          - text: Use calipers to ±0.001" accuracy
            subitems: []
          - text: Read micrometers correctly
            subitems: []
          - text: Perform basic layout with height gauge
            subitems: []
          - text: Use angle measuring tools accurately
            subitems: []
      - heading: Basic Hand Tools
        items:
          - text: File to specified dimensions and surface finish
            subitems: []
          - text: Cut materials with hand saws
            subitems: []
          - text: Use taps and dies properly
            subitems: []
          - text: Demonstrate proper deburring techniques
            subitems: []
      - heading: Workholding
        items:
          - text: Use bench vises safely
            subitems: []
          - text: Select appropriate clamps and fixtures
            subitems: []
          - text: Demonstrate proper part support
            subitems: []
          - text: Practice safe material handling
            subitems: []
    completionRequirements:
      - Complete all checklist items with mentor verification
      - Pass safety certification exam
      - Complete measurement accuracy test
      - Demonstrate proper tool handling
  - level: 2
    title: Power Tools & Basic Machining
    description: Power tool operation and basic machining skills
    objective: Master safe operation of power tools and basic machine tools including drill press, band saw, and bench grinder, perform fundamental machining operations on manual mill and lathe with proper setup and tooling selection, implement quality control procedures including in-process inspection and documentation, and develop basic fixturing skills.
    prerequisites:
      - module: manufacturing
        level: 1
        text: null
      - module: mechanical
        level: 1
        text: null
    primaryResources:
      - Machine Tool Operations Guide
      - Cutting Speed Calculator
      - Quality Control Templates
      - Setup Documentation Examples
    tasks:
      - heading: Power Tool Operations
        items:
          - text: Use drill press safely and effectively
            subitems: []
          - text: Operate band saw with proper blade selection
            subitems: []
          - text: Use bench and angle grinders safely
            subitems: []
          - text: Master portable power tool operations
            subitems: []
      - heading: Basic Machining
        items:
          - text: Set up and operate manual mill
            subitems: []
          - text: Perform basic lathe operations
            subitems: []
          - text: Select proper cutting tools and speeds
            subitems: []
          - text: Complete basic machining project
            subitems: []
      - heading: Quality Control
        items:
          - text: Perform in-process inspection
            subitems: []
          - text: Document critical dimensions
            subitems: []
          - text: Use go/no-go gauges
            subitems: []
          - text: Maintain quality control records
            subitems: []
      - heading: Workholding & Setup
        items:
          - text: Design simple fixtures
            subitems: []
          - text: Use machine vises properly
            subitems: []
          - text: Implement 3-2-1 locating principles
            subitems: []
          - text: Create setup documentation
            subitems: []
    completionRequirements:
      - Complete all checklist items with mentor verification
      - Successfully complete machining project
      - Pass power tool safety evaluation
      - Create complete documentation package
  - level: 3
    title: Advanced Machining & Fixtures
    description: Complex machining operations and fixture design
    objective: Execute complex machining operations requiring tight tolerances and surface finish specifications, design and fabricate custom fixturing for repeatable part production, develop comprehensive process planning documentation including operation sequencing and tooling requirements, and coordinate manufacturing with design requirements.
    prerequisites:
      - module: manufacturing
        level: 2
        text: null
      - module: cad
        level: 2
        text: null
      - module: mechanical
        level: 2
        text: null
    primaryResources:
      - Advanced Machining Guide
      - Fixture Design Manual
      - Process Planning Templates
      - Design for Manufacturing Guide
    tasks:
      - heading: Advanced Machining
        items:
          - text: Perform complex milling operations
            subitems: []
          - text: Machine precision turned components
            subitems: []
          - text: Achieve specified surface finishes
            subitems: []
          - text: Machine to tight tolerances (±0.001")
            subitems: []
      - heading: Fixture Design
        items:
          - text: Design custom fixturing systems
            subitems: []
          - text: Create modular fixture components
            subitems: []
          - text: Implement quick-change features
            subitems: []
          - text: Validate fixture repeatability
            subitems: []
      - heading: Process Planning
        items:
          - text: Create detailed operation sequences
            subitems: []
          - text: Specify tooling requirements
            subitems: []
          - text: Document setup procedures
            subitems: []
          - text: Develop inspection protocols
            subitems: []
      - heading: Design Integration
        items:
          - text: Review designs for manufacturability
            subitems: []
          - text: Suggest design improvements
            subitems: []
          - text: Coordinate with design team
            subitems: []
          - text: Create manufacturing feedback loop
            subitems: []
    completionRequirements:
      - Complete all checklist items with mentor verification
      - Successfully machine complex parts
      - Design and implement custom fixtures
      - Create comprehensive process documentation
  - level: 4
    title: Manufacturing Leadership
    description: High-level manufacturing operations and program leadership
    objective: Lead manufacturing operations including process optimization and lean manufacturing implementation, develop innovative manufacturing solutions through technology integration and continuous improvement, establish comprehensive quality management systems, and mentor future manufacturing team members while building sustainable manufacturing practices.
    prerequisites:
      - module: manufacturing
        level: 3
        text: null
      - module: project-management
        level: 2
        text: null
      - module: cad
        level: 3
        text: null
    primaryResources:
      - Lean Manufacturing Guide
      - Quality Management Manual
      - Manufacturing Innovation Resources
      - Leadership Development Guide
    tasks:
      - heading: Manufacturing Leadership
        items:
          - text: Lead manufacturing team operations
            subitems: []
          - text: Implement lean manufacturing principles
            subitems: []
          - text: Optimize production workflows
            subitems: []
          - text: Develop manufacturing strategies
            subitems: []
      - heading: Process Innovation
        items:
          - text: Research advanced manufacturing technologies
            subitems: []
          - text: Implement innovative production methods
            subitems: []
          - text: Develop custom manufacturing solutions
            subitems: []
          - text: Create manufacturing improvement plans
            subitems: []
      - heading: Quality Management
        items:
          - text: Establish quality control systems
            subitems: []
          - text: Implement statistical process control
            subitems: []
          - text: Develop inspection procedures
            subitems: []
          - text: Create quality documentation standards
            subitems: []
      - heading: Program Development
        items:
          - text: Mentor manufacturing team members
            subitems: []
          - text: Document manufacturing best practices
            subitems: []
          - text: Create training materials
            subitems: []
          - text: Build sustainable manufacturing program
            subitems: []
    completionRequirements:
      - Complete all checklist items with mentor verification
      - Successfully lead manufacturing operations
      - Implement process improvements
      - Create comprehensive documentation system
