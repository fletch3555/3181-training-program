components:
  prerequisite:
    label: Prerequisite
    type: object
    fields:
      - name: module
        label: Module
        type: reference
        required: false
        options:
          collection: curriculum
      - name: level
        type: number
        required: false
        options:
          min: 1
          max: 4
      - name: text
        label: Label (used when not referencing a module/level)
        type: string
        required: false

  taskItem:
    label: Task Item
    type: object
    fields:
      - name: text
        type: string
      - name: subitems
        type: string
        list: true
        required: false

  task:
    label: Task
    type: object
    fields:
      - name: heading
        type: string
      - name: items
        component: taskItem
        list: true

  level:
    label: Level
    type: object
    fields:
      - name: level
        type: number
        options:
          min: 1
          max: 4
      - name: title
        type: string
      - name: description
        type: text
      - name: objective
        label: Learning Objective
        type: text
      - name: prerequisites
        component: prerequisite
        list: true
        required: false
      - name: primaryResources
        label: Primary Resources
        type: string
        list: true
      - name: tasks
        component: task
        list: true
      - name: completionRequirements
        label: Completion Requirements
        type: string
        list: true

content:
- name: curriculum
  label: Curriculum Modules
  type: collection
  path: _data/curriculum
  filename: '{{slug}}.yml'
  subfolders: false
  fields:
    - name: name
      label: Short Name
      type: string
      description: Used in navigation and prerequisite labels, e.g. "CAD"
    - name: title
      type: string
      description: Full page title, e.g. "CAD Training"
    - name: description
      type: text
    - name: intro
      label: Intro Paragraph
      type: text
    - name: moduleType
      type: select
      options:
        values:
          - Technical
          - Non-Technical
    - name: order
      type: number
    - name: resources
      label: Module Resources
      type: string
      list: true
    - name: levels
      component: level
      list: true

media:
  input: assets/images
  output: /assets/images
